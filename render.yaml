version: "1"
services:
  - type: web
    name: insurance-premium-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn insurance_premium_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10

  - type: web
    name: insurance-premium-ui
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run UI.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
